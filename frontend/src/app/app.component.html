<a class="skip-link" href="#main-content">Skip to main content</a>

@if (showNavbar()) {
  <app-navbar></app-navbar>
}

<main id="main-content" class="container" role="main" aria-label="Main content">
  <router-outlet></router-outlet>
</main>

@if (isIdle()) {
  <div
    class="idle-overlay"
    role="status"
    aria-live="polite"
    aria-label="Screensaver active"
    (click)="onUserInteraction()"
    (keydown)="onUserInteraction()">
    <div class="idle-particles" aria-hidden="true"></div>
    <div class="idle-content">
      <div class="idle-icon" aria-hidden="true">🗳️</div>
      <h2>Your Vote Matters</h2>
      <p class="idle-hint">Click or press any key to continue</p>
    </div>
  </div>
}
