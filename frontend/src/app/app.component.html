<a class="skip-link" href="#main-content">{{ i18n.t('accessibility.skipToContent') }}</a>

@if (showNavbar()) {
  <app-navbar></app-navbar>
}

<main id="main-content" class="container" role="main" aria-label="Main content">
  <router-outlet></router-outlet>
</main>

@if (isIdle()) {
  <div
    class="idle-overlay"
    role="status"
    aria-live="polite"
    aria-label="Screensaver active"
    tabindex="0"
    (click)="onUserInteraction()"
    (keydown)="onUserInteraction()">
    <div class="idle-particles" aria-hidden="true"></div>
    <div class="idle-content">
      <div class="idle-icon" aria-hidden="true">🗳️</div>
      <h2>{{ i18n.t('idle.title') }}</h2>
      <p class="idle-hint">{{ i18n.t('idle.hint') }}</p>
    </div>
  </div>
}
